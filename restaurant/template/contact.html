<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - Food Paradise</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

.header{
    background:url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4')
    no-repeat center center/cover;
    height:40vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.header h1{
    background:rgba(0,0,0,0.6);
    padding:20px 40px;
    border-radius:10px;
    font-size:50px;
}

.contact-container{
    width:90%;
    max-width:1100px;
    margin:50px auto;
    display:flex;
    flex-wrap:wrap;
    gap:30px;
}

.contact-info,
.contact-form{
    flex:1;
    min-width:300px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.contact-info h2,
.contact-form h2{
    color:#d35400;
    margin-bottom:20px;
}

.contact-info p{
    margin:15px 0;
    font-size:18px;
    color:#555;
}

.contact-form input,
.contact-form textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

.contact-form textarea{
    resize:none;
    height:120px;
}

.contact-form button{
    background:#d35400;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

.contact-form button:hover{
    background:#a84300;
}

#successMsg{
    color:green;
    margin-top:15px;
    font-weight:bold;
}

footer{
    background:#222;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
}
</style>
</head>
<body>

<div class="header">
    <h1>Contact Us</h1>
</div>

<div class="contact-container">

    <div class="contact-info">
        <h2>Get In Touch</h2>
        <p><strong>📍 Address:</strong> Sector 18, Noida, Uttar Pradesh</p>
        <p><strong>📞 Phone:</strong> +91 9876543210</p>
        <p><strong>📧 Email:</strong> info@foodparadise.com</p>
        <p><strong>🕒 Timing:</strong> 10:00 AM - 11:00 PM</p>
    </div>

    <div class="contact-form">
        <h2>Send Message</h2>

        <form id="contactForm">
            <input type="text" placeholder="Your Name" required>

            <input type="email" placeholder="Your Email" required>

            <input type="text" placeholder="Subject" required>

            <textarea placeholder="Your Message" required></textarea>

            <button type="submit">Send Message</button>

            <p id="successMsg"></p>
        </form>
    </div>

</div>

<footer>
    <p>&copy; 2026 Food Paradise Restaurant | All Rights Reserved</p>
</footer>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e){
    e.preventDefault();

    document.getElementById("successMsg").innerHTML =
    "✅ Message Sent Successfully! We will contact you soon.";

    this.reset();
});
</script>

</body>
</html>
