<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Table Reservation | Food Paradise</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f5f5f5;
}

.hero{
    height:60vh;
    background:url('https://images.unsplash.com/photo-1514933651103-005eec06c04b')
    center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
}

.hero h1{
    color:white;
    font-size:55px;
    background:rgba(0,0,0,0.6);
    padding:20px 40px;
    border-radius:10px;
}

.container{
    max-width:800px;
    margin:50px auto;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.container h2{
    text-align:center;
    color:#d35400;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:15px;
}

input,
select,
textarea{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

textarea{
    resize:none;
    height:120px;
}

button{
    width:100%;
    background:#d35400;
    color:white;
    border:none;
    padding:15px;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#b84300;
}

.success{
    margin-top:20px;
    text-align:center;
    color:green;
    font-size:18px;
    font-weight:bold;
}

.booking-details{
    display:none;
    margin-top:20px;
    background:#fff8f2;
    border-left:5px solid #d35400;
    padding:15px;
    border-radius:5px;
}

footer{
    background:#222;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}

@media(max-width:768px){
.hero h1{
font-size:35px;
text-align:center;
}
.container{
margin:20px;
padding:25px;
}
}
</style>
</head>
<body>

<div class="hero">
    <h1>Reserve Your Table</h1>
</div>

<div class="container">

<h2>Book Your Table Now</h2>

<form id="reservationForm">

<div class="input-group">
<input type="text" id="name" placeholder="Full Name" required>
</div>

<div class="input-group">
<input type="tel" id="phone" placeholder="Phone Number" required>
</div>

<div class="input-group">
<input type="email" id="email" placeholder="Email Address" required>
</div>

<div class="input-group">
<input type="date" id="date" required>
</div>

<div class="input-group">
<input type="time" id="time" required>
</div>

<div class="input-group">
<select id="guests" required>
<option value="">Select Guests</option>
<option>1 Guest</option>
<option>2 Guests</option>
<option>3 Guests</option>
<option>4 Guests</option>
<option>5 Guests</option>
<option>6 Guests</option>
<option>7 Guests</option>
<option>8 Guests</option>
<option>More than 8 Guests</option>
</select>
</div>

<div class="input-group">
<textarea id="message" placeholder="Special Request (Optional)"></textarea>
</div>

<button type="submit">Reserve Table</button>

</form>

<div class="success" id="successMsg"></div>

<div class="booking-details" id="bookingDetails">
<h3>Reservation Details</h3>
<p id="details"></p>
</div>

</div>

<footer>
<p>© 2026 Food Paradise Restaurant | All Rights Reserved</p>
</footer>

<script>

document.getElementById("reservationForm")
.addEventListener("submit", function(e){

e.preventDefault();

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let email = document.getElementById("email").value;
let date = document.getElementById("date").value;
let time = document.getElementById("time").value;
let guests = document.getElementById("guests").value;

if(phone.length < 10){
alert("Please enter a valid phone number");
return;
}

document.getElementById("successMsg").innerHTML =
"✅ Table Reserved Successfully!";

document.getElementById("bookingDetails").style.display="block";

document.getElementById("details").innerHTML =
"<strong>Name:</strong> " + name + "<br>" +
"<strong>Phone:</strong> " + phone + "<br>" +
"<strong>Email:</strong> " + email + "<br>" +
"<strong>Date:</strong> " + date + "<br>" +
"<strong>Time:</strong> " + time + "<br>" +
"<strong>Guests:</strong> " + guests;

document.getElementById("reservationForm").reset();

});

</script>

</body>
</html>
